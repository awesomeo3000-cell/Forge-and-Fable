services:
  - type: web
    name: forge-and-fable
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
      - key: ADMIN_EMAILS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: APP_URL
        value: https://dreamwright.gg
      - key: FORGE_VAULT_DIR
        value: /var/data
      # Async PDF-import jobs with OCR — the synchronous analyze fallback
      # times out on scanned sheets behind the platform's request timeout.
      - key: PDF_IMPORT_OCR_ENABLED
        value: "true"
      - key: FORGE_BACKUP_DIR
        sync: false
    disk:
      name: forge-vault
      mountPath: /var/data
      sizeGB: 1
