name: Apply agent patch

on:
  push:
    branches:
      - "agent/**"
    paths:
      - "agent-patches/*.patch"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply queued patches
        shell: bash
        run: |
          shopt -s nullglob
          patches=(agent-patches/*.patch)
          if [ ${#patches[@]} -eq 0 ]; then
            echo "No queued patches."
            exit 0
          fi
          for patch in "${patches[@]}"; do
            git apply --check "$patch"
            git apply "$patch"
          done
          rm -f agent-patches/*.patch
          git config user.name "Dreamwright Agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Integrate homebrew caster slots"
          git push origin "HEAD:${GITHUB_REF_NAME}"
