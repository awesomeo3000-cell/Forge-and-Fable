name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate rules research
        run: npm run rules:validate-research

      - name: Validate release assets
        run: npm run assets:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Audit all dependencies
        run: npm audit

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Hosted browser smoke tests
        run: npm run test:e2e
