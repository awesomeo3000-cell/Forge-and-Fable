name: Off-volume database backup

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKUP_URL: ${{ secrets.DREAMWRIGHT_BACKUP_URL }}
      BACKUP_TOKEN: ${{ secrets.DREAMWRIGHT_BACKUP_TOKEN }}

    steps:
      - name: Checkout verification script
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate backup secrets
        shell: bash
        run: |
          test -n "$BACKUP_URL"
          test ${#BACKUP_TOKEN} -ge 32

      - name: Download consistent SQLite backup
        shell: bash
        run: |
          BACKUP_URL="${BACKUP_URL%/}"
          curl --fail --silent --show-error --retry 3 --retry-all-errors \
            --header "Authorization: Bearer $BACKUP_TOKEN" \
            --output dreamwright-latest.db \
            "$BACKUP_URL/api/admin/backup"

      - name: Verify backup
        run: node scripts/verify-db-backup.mjs dreamwright-latest.db

      - name: Exercise restore copy
        run: node scripts/drill-db-restore.mjs dreamwright-latest.db

      - name: Store off-volume backup
        uses: actions/upload-artifact@v4
        with:
          name: dreamwright-backup-${{ github.run_id }}
          path: dreamwright-latest.db
          retention-days: 30
          compression-level: 0
          if-no-files-found: error

      - name: Open or update failure alert
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Dreamwright off-volume backup failed";
            const body = `The scheduled backup workflow failed. Review: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }
