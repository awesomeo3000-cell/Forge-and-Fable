name: Agent validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
  push:
    branches:
      - "agent/**"

concurrency:
  group: agent-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint:ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
